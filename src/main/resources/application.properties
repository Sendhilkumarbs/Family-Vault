# Application
spring.application.name=Family Vault

# Display branding (used in UI and emails)
app.display-name=Family Vault
app.description=One secure place to store and access your family's bank accounts, documents, property records, and more.
server.port=8080

# ─── Runtime Configuration ─────────────────────────────────────
# This file is the default. For runtime configuration, edit:
# config/application.properties (created automatically)
# Or use the Settings page at: http://localhost:8080/settings
# Spring Boot will load external config from: config/application.properties
spring.config.additional-location=file:./config/

# H2 Database — file-based so data persists between restarts
spring.datasource.url=jdbc:h2:file:./data/bankdetails;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (accessible at /h2-console for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# ─── Email Notifications (FREE) ──────────────────────────────
# Enable email notifications (set to true when ready to use)
email.notifications.enabled=false

# Email Configuration (Gmail Example)
# For Gmail: Use App Password (not regular password)
# 1. Enable 2-Step Verification
# 2. Generate App Password: https://myaccount.google.com/apppasswords
spring.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=your-email@gmail.com

# Alternative: Outlook/Hotmail
# spring.mail.host=smtp-mail.outlook.com
# spring.mail.port=587

# Alternative: Yahoo
# spring.mail.host=smtp.mail.yahoo.com
# spring.mail.port=587

# Alternative: Custom SMTP
# spring.mail.host=smtp.yourdomain.com
# spring.mail.port=587
# spring.mail.username=your-username
# spring.mail.password=your-password
